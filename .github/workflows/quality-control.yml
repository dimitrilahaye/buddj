name: Buddj ~ Quality control

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  back_checks:
    name: Back ~ Quality Checks
    runs-on: ubuntu-latest
    container: node:22.14.0-bookworm-slim

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Back ~ Use Node
      uses: actions/setup-node@v4
      with:
        node-version: "22.14.0"

    - name: Back ~ Install
      working-directory: ./back
      run: npm install

    - name: Back ~ ESLint checks
      working-directory: ./back
      run: npm run lint

    - name: Back ~ Tests
      working-directory: ./back
      run: npm run tf
      env:
        DB_URL_TEST: postgres
        DB_PORT_TEST: 5432
        DB_USER_TEST: postgres
        DB_PASSWORD_TEST: postgres
        DB_NAME_TEST: postgres
        PORT: ${{ secrets.PORT }}
        CLIENT_ID: ${{ secrets.CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        REDIRECT_URI: ${{ secrets.REDIRECT_URI }}
        SCOPES: ${{ secrets.SCOPES }}
        SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        FRONT_URL: ${{ secrets.FRONT_URL }}
        FRONT_REDIRECT_URL: ${{ secrets.FRONT_REDIRECT_URL }}
        TEMPLATE: ${{ secrets.TEMPLATE }}
        YEARLY: ${{ secrets.YEARLY }}
        YEARLY_BUDGETS: ${{ secrets.YEARLY_BUDGETS }}

  front_v3_checks:
    name: Front v3 ~ Quality Checks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Front v3 ~ Use Node
      uses: actions/setup-node@v4
      with:
        node-version: "22.14.0"

    - name: Front v3 ~ Install
      working-directory: ./front-v3
      run: npm install

    - name: Front v3 ~ Lint
      working-directory: ./front-v3
      run: npm run lint

    - name: Front v3 ~ Build
      working-directory: ./front-v3
      run: npm run build

  back_CD:
    name: Back ~ Deployment
    if: github.event_name == 'push'
    needs: [ back_checks, front_v3_checks ]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Deploy
      env:
        deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL_API }}
      run: curl "$deploy_url"

